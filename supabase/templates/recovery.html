<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="440" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;padding:32px;max-width:440px;">
            <tr>
              <td style="font-size:18px;font-weight:700;color:#1a1a2e;padding-bottom:8px;">
                Reset your MyPlanr password
              </td>
            </tr>
            <tr>
              <td style="font-size:14px;color:#5a5a6e;line-height:1.5;padding-bottom:20px;">
                Enter this code in the app to choose a new password. It expires shortly.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:12px 0 20px 0;">
                <div style="display:inline-block;background:#f0eefb;color:#4322b8;font-size:30px;font-weight:700;letter-spacing:8px;padding:14px 24px;border-radius:12px;">
                  {{ .Token }}
                </div>
              </td>
            </tr>
            <tr>
              <td style="font-size:12px;color:#9a9aa8;line-height:1.5;">
                If you didn't request a password reset, you can safely ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
