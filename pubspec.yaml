name: myplanr
description: Family home pantry, expenses, recipes, and shopping list manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.4
  http: ^1.6.0
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_local_notifications: ^19.1.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.0.5
  uuid: ^4.5.1
  crypto: ^3.0.6
  flutter_svg: ^2.0.17
  timezone: ^0.10.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  in_app_review: ^2.0.12
  in_app_update: ^4.2.5
  flutter_secure_storage: ^10.3.1
  fl_chart: 0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/myplanr_app_icon.png
  adaptive_icon_background: "#0D9488"
  adaptive_icon_foreground: assets/branding/myplanr_app_icon.png
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/myplanr_app_icon.png
  android_12:
    color: "#FFFFFF"
    image: assets/branding/myplanr_app_icon.png
  ios: true
  android: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/
    - assets/legal/
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
