name: myplanr
description: Family home pantry, expenses, recipes, and shopping list manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.4
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_local_notifications: ^19.1.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.0.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
